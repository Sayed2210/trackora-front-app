name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - run: npx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npx nx run-many -t lint test build typecheck
      - run: npx nx fix-ci
        if: always()

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e:smoke
        env:
          CI: true
          E2E_API_BASE_URL: ${{ secrets.E2E_API_BASE_URL }}
          E2E_ADMIN_BASE_URL: ${{ secrets.E2E_ADMIN_BASE_URL }}
          E2E_MERCHANT_BASE_URL: ${{ secrets.E2E_MERCHANT_BASE_URL }}
          E2E_COURIER_BASE_URL: ${{ secrets.E2E_COURIER_BASE_URL }}
          E2E_OWNER_BASE_URL: ${{ secrets.E2E_OWNER_BASE_URL }}
          E2E_ADMIN_PHONE: ${{ secrets.E2E_ADMIN_PHONE }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_MERCHANT_PHONE: ${{ secrets.E2E_MERCHANT_PHONE }}
          E2E_MERCHANT_PASSWORD: ${{ secrets.E2E_MERCHANT_PASSWORD }}
          E2E_COURIER_PHONE: ${{ secrets.E2E_COURIER_PHONE }}
          E2E_COURIER_PASSWORD: ${{ secrets.E2E_COURIER_PASSWORD }}
          E2E_OWNER_PHONE: ${{ secrets.E2E_OWNER_PHONE }}
          E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
          SKIP_WEB_SERVER: 'true'

      - name: Upload Playwright reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-smoke-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  e2e-full:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: e2e-smoke
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run E2E full regression
        run: npm run test:e2e:full
        env:
          CI: true
          E2E_API_BASE_URL: ${{ secrets.E2E_API_BASE_URL }}
          E2E_ADMIN_BASE_URL: ${{ secrets.E2E_ADMIN_BASE_URL }}
          E2E_MERCHANT_BASE_URL: ${{ secrets.E2E_MERCHANT_BASE_URL }}
          E2E_COURIER_BASE_URL: ${{ secrets.E2E_COURIER_BASE_URL }}
          E2E_OWNER_BASE_URL: ${{ secrets.E2E_OWNER_BASE_URL }}
          E2E_ADMIN_PHONE: ${{ secrets.E2E_ADMIN_PHONE }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_MERCHANT_PHONE: ${{ secrets.E2E_MERCHANT_PHONE }}
          E2E_MERCHANT_PASSWORD: ${{ secrets.E2E_MERCHANT_PASSWORD }}
          E2E_COURIER_PHONE: ${{ secrets.E2E_COURIER_PHONE }}
          E2E_COURIER_PASSWORD: ${{ secrets.E2E_COURIER_PASSWORD }}
          E2E_OWNER_PHONE: ${{ secrets.E2E_OWNER_PHONE }}
          E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
          SKIP_WEB_SERVER: 'true'

      - name: Upload Playwright reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-full-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
